# MCP Stack with Tool Filtering
#
# NOTE: This example predates the agent removal pivot. Use mcp-basic.yaml instead.
# Kept for reference; the agents: section is ignored by gridctl.
#
# Demonstrates:
# - MCP servers providing tools
# - Server-level tool filtering
# - Environment variable injection
#
# For current examples, see:
# - getting-started/mcp-basic.yaml (recommended starting point)
# - transports/local-mcp.yaml (real MCP server logic via stdio)
# - platforms/github-mcp.yaml (real third-party MCP server)
#
# Usage:
#   gridctl deploy examples/getting-started/mcp-basic.yaml
#
version: "1"
name: mcp-demo

network:
  name: mcp-demo-net

mcp-servers:
  - name: tools-server
    image: alpine:latest
    port: 8080
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    description: "Primary tools server"

  - name: secondary-server
    image: alpine:latest
    port: 8081
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    description: "Secondary tools server"
