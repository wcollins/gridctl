# Skills Registry Stack
#
# Demonstrates the skills registry alongside MCP servers.
# Skills defined in ~/.gridctl/registry/skills/ are exposed as MCP prompts
# (and as MCP tools if they have a workflow block).
#
# Usage:
#   gridctl deploy examples/getting-started/skills-basic.yaml
#   gridctl skill list
#   gridctl activate my-skill
#   gridctl test my-skill

version: "1"
name: skills-demo

network:
  name: skills-demo-net

mcp-servers:
  - name: tools-server
    image: alpine:latest
    port: 8080
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    description: "Tools server for skill workflows to call"
