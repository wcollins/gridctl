# Basic MCP Stack
#
# Demonstrates core gridctl concepts:
# - Multiple MCP servers with different transports
# - Server-level tool filtering
# - Environment variable expansion
#
# Usage:
#   gridctl deploy examples/getting-started/mcp-basic.yaml
#
version: "1"
name: mcp-basic

network:
  name: mcp-basic-net

mcp-servers:
  # Primary server — exposes only specific tools (server-level filtering)
  - name: tools-server
    image: alpine:latest
    port: 8080
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    description: "Primary tools server"
    tools: ["read", "list", "search"]  # Only these tools are exposed to clients

  # Secondary server — all tools exposed (no filtering)
  - name: secondary-server
    image: alpine:latest
    port: 8081
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    description: "Secondary tools server"
