name: Gatekeeper

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Go dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=3m

      - name: Go tests with coverage
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 65" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 65% threshold"
            exit 1
          fi

      - name: Per-package coverage thresholds
        run: bash scripts/check-coverage.sh

      - name: Go vulnerability check
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build Go binary
        run: make build-go

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Go dependencies
        run: go mod download

      - name: Integration tests
        run: go test -tags=integration -race -timeout 5m ./tests/integration/...

  podman-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Start Podman socket
        run: |
          systemctl --user enable --now podman.socket
          podman system service --time=0 &
          sleep 1
          echo "DOCKER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> "$GITHUB_ENV"

      - name: Verify Podman
        run: podman info --format '{{.Version.Version}}'

      - name: Install Go dependencies
        run: go mod download

      - name: Integration tests (Podman)
        env:
          GRIDCTL_RUNTIME: podman
        run: go test -tags=integration -race -timeout 5m ./tests/integration/...

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: web

      - name: Tests with coverage
        run: npx vitest run --coverage
        working-directory: web

      - name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=high
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
